server.port=9097

# --- Database (MySQL) ---
# When running locally (without Docker) replace "mysql" host with "localhost".
spring.datasource.url=jdbc:mysql://mysql:3306/expense_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --- JWT ---
# Secret used to sign tokens (Base64). Keep simple for the project.
app.jwt.secret=ZmFrZS1zZWNyZXQta2V5LWZvci11bml2ZXJzaXR5LXByb2plY3QtMTIzNDU2Nzg5MA==
# Token validity in milliseconds (24 hours)
app.jwt.expiration-ms=86400000
